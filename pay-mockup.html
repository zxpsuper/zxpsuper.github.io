<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付页面改造 - 设计方案</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #f0f2f5;
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  h1 { text-align: center; margin-bottom: 30px; }
  .tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .tab-btn {
    padding: 10px 24px;
    border: none;
    background: #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
  }
  .tab-btn.active { background: #1677ff; color: white; }
  .section { display: none; }
  .section.active { display: block; }

  /* 管理模式布局 */
  .admin-layout {
    display: flex;
    gap: 16px;
    height: 700px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .panel { flex: 1; display: flex; flex-direction: column; }
  .panel-header {
    background: #f5f7fa;
    padding: 12px 16px;
    font-weight: 600;
    border-bottom: 1px solid #e8e8e8;
  }
  .panel-content { flex: 1; padding: 20px; overflow-y: auto; }

  /* 编辑表单 */
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #333;
  }
  .form-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 14px;
  }
  .form-input:focus { outline: none; border-color: #1677ff; }
  .file-upload {
    border: 2px dashed #d9d9d9;
    border-radius: 8px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    background: #fafafa;
  }
  .upload-btn {
    display: inline-block;
    padding: 10px 20px;
    background: #1677ff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }
  .copy-btn {
    width: 100%;
    padding: 12px;
    background: #52c41a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: auto;
  }
  .copy-btn:hover { opacity: 0.9; }

  /* 预览卡片 */
  .preview-card {
    max-width: 380px;
    margin: 0 auto;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .preview-avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 30px auto 16px;
    background: #d9d9d9;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .preview-name {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .preview-company {
    text-align: center;
    color: #666;
    font-size: 15px;
    padding-bottom: 30px;
  }
  .placeholder { color: #999; }

  /* 预览模式布局 */
  .preview-layout {
    min-height: 700px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
  }

  /* 说明文字 */
  .note {
    margin-top: 20px;
    padding: 16px;
    background: #fff7e6;
    border-radius: 8px;
    color: #fa8c16;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>支付页面改造 - 设计方案</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('admin')">管理模式</button>
  <button class="tab-btn" onclick="showTab('preview')">预览模式</button>
</div>

<!-- 管理模式 -->
<div class="section active" id="admin">

        <div class="form-group">

          <input type="text" class="form-input" placeholder="请输入姓名" value="郑焕辉">
        </div>
        <div class="form-group">
          <label class="form-label">公司名称</label>
          <input type="text" class="form-input" placeholder="请输入公司名称" value="广东纽瑞芯">
        </div>
        <div class="form-group">
          <label class="form-label">图片上传</label>
          <div class="file-upload">
            <span class="upload-btn">选择图片文件</span>
            <p style="color:#999;margin-top:12px;font-size:13px;">支持 jpg、png、gif</p>
          </div>
        </div>
      </div>
      <div style="padding:0 20px 20px;">
        <button class="copy-btn">复制链接</button>
      </div>
    </div>

    • 可直接分享此链接给他人查看

<script>
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab).classList.add('active');
}
</script>
</body>
</html>
