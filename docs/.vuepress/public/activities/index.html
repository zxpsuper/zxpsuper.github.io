<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尚白活动中心</title>
    <link rel="stylesheet" href="styles/app.css">
</head>
<body>
    <div id="app">
        <div id="page-index" class="page active">
            <div class="container">
                <div id="empty-tip" class="empty-tip" style="display: none;">
                    <span>暂无活动</span>
                </div>
                <div id="activity-list" class="activity-list"></div>
            </div>
        </div>

        <div id="page-detail" class="page">
            <div class="nav-bar">
                <span class="back-btn" onclick="goBack()">← 返回</span>
                <span class="nav-title">活动详情</span>
            </div>
            <div class="container" style="padding-top: 56px;">
                <div id="image-swiper" class="image-swiper" style="display: none;"></div>
                <div id="no-image" class="no-image" style="display: none;">
                    <span>暂无图片</span>
                </div>
                <div class="detail-content card">
                    <div id="detail-title" class="detail-title"></div>
                    <div id="like-section" class="like-section">
                        <span id="like-icon" class="like-icon">❤</span>
                        <span id="like-count" class="like-count">0</span>
                    </div>
                    <div id="detail-desc" class="detail-desc"></div>
                </div>
                <div id="reserve-section" class="reserve-section">
                    <button id="reserve-btn" class="reserve-btn btn-primary">立即预约</button>
                </div>
            </div>
        </div>

        <div id="page-mine" class="page">
            <div class="container">
                <div class="header">
                    <img class="avatar" src="https://suporka-resource.netlify.app/img/avatar.jpg" alt="头像">
                    <div class="nickname">尚白记录</div>
                </div>
                <div class="info-section card">
                    <div class="info-item">
                        <div class="info-label">个人简介</div>
                        <div class="info-value">热爱生活，热爱分享</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">创建时间</div>
                        <div class="info-value">2026年4月</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">记录数量</div>
                        <div id="activity-count" class="info-value">0 个</div>
                    </div>
                </div>
                <button class="feedback-btn btn-primary" onclick="openFeedbackModal()">我有话说</button>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active" data-page="index" onclick="switchPage('index')">
                <span class="tab-icon">🏠</span>
                <span class="tab-text">首页</span>
            </div>
            <div class="tab-item" data-page="mine" onclick="switchPage('mine')">
                <span class="tab-icon">👤</span>
                <span class="tab-text">我的</span>
            </div>
        </div>
    </div>

    <div id="phone-modal" class="modal-mask" style="display: none;">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title">填写预约信息</div>
            <div class="modal-form">
                <div class="form-row">
                    <div class="form-label">昵称</div>
                    <div class="user-info-input">
                        <img id="mini-avatar" class="mini-avatar" style="display: none;">
                        <input id="nickname-input" type="text" class="nickname-input" placeholder="请输入昵称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-label">手机号码</div>
                    <input id="phone-input" type="number" class="phone-input" placeholder="请输入手机号码" maxlength="11">
                </div>
                <div class="form-tip">昵称和手机号码至少填写一个</div>
            </div>
            <div class="modal-actions">
                <button id="cancel-btn" class="modal-btn cancel-btn">取消</button>
                <button id="confirm-btn" class="modal-btn confirm-btn">确认预约</button>
            </div>
        </div>
    </div>

    <div id="feedback-modal" class="modal-mask" style="display: none;">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title">我有话说</div>
            <div class="modal-form">
                <div class="form-row">
                    <div class="form-label">联系方法</div>
                    <input id="feedback-contact" type="text" class="nickname-input" placeholder="请输入联系方式">
                </div>
                <div class="form-row">
                    <div class="form-label">想说的话</div>
                    <textarea id="feedback-content" class="feedback-textarea" placeholder="请输入您想说的话"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button id="feedback-cancel-btn" class="modal-btn cancel-btn">取消</button>
                <button id="feedback-confirm-btn" class="modal-btn confirm-btn">提交</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
