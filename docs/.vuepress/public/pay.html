<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加班管理 - 钉钉</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    margin: 0;
    padding: 0;
  }
  body.admin-mode {
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .phone-wrap {
    width: 100%;
    max-width: 100%;
    min-height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: visible;
    margin: 0;
    padding: 0;
  }
  .admin-panel .phone-wrap {
    max-width: 390px;
  }

  /* 顶部导航栏 */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 10px;
    background: #fff;
    border-bottom: 0.5px solid #e8e8e8;
  }
  .nav-back {
    font-size: 18px;
    color: #333;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .nav-title {
    font-size: 17px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .nav-more {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .nav-more-dots {
    display: flex;
    gap: 3px;
  }
  .nav-more-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #666;
    display: block;
  }

  /* 企业信息卡片 */
  .company-card {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    background: #fff;
    border-bottom: 8px solid #f5f5f5;
    cursor: pointer;
  }
  .company-logo {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #1677ff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: 12px;
  }
  .company-logo svg {
    width: 30px;
    height: 30px;
  }
  .company-info {
    flex: 1;
  }
  .company-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .company-name {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .company-badge {
    font-size: 11px;
    color: #1677ff;
    border: 1px solid #1677ff;
    border-radius: 3px;
    padding: 1px 5px;
    white-space: nowrap;
  }
  .company-sub {
    font-size: 13px;
    color: #999;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .company-sub-arrow {
    font-size: 12px;
    color: #999;
  }

  /* 加班管理标题区 */
  .overtime-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    background: #fff;
    border-bottom: 0.5px solid #f0f0f0;
  }
  .overtime-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .overtime-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #1677ff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .overtime-icon svg {
    width: 14px;
    height: 14px;
  }
  .overtime-title {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .overtime-record {
    font-size: 13px;
    color: #1677ff;
    display: flex;
    align-items: center;
    gap: 3px;
    cursor: pointer;
  }

  /* 主要内容区 */
  .main-content {
    padding: 0 16px 20px;
    background: #fff;
  }

  /* 当前时间提示 */
  .time-notice {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0 16px;
    border-bottom: 0.5px solid #f0f0f0;
    margin-bottom: 20px;
  }
  .time-notice-icon {
    font-size: 18px;
    line-height: 1;
  }
  .time-notice-text {
    font-size: 14px;
    color: #666;
  }
  .time-highlight {
    color: #ff4d4f;
    font-weight: 500;
  }
  .overtime-badge-text {
    color: #ff4d4f;
    font-size: 13px;
  }
  .separator {
    color: #ccc;
    margin: 0 4px;
  }

  /* 头像区 */
  .avatar-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 16px;
  }
  .avatar-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #e8e8e8;
    margin-bottom: 10px;
    background: #d0d0d0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-wrap svg {
    width: 72px;
    height: 72px;
  }
  .avatar-status {
    font-size: 13px;
    color: #999;
    margin-bottom: 8px;
  }

  /* 标题文字 */
  .pay-title {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
    text-align: center;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .pay-desc {
    font-size: 13px;
    color: #666;
    text-align: center;
    line-height: 1.8;
    margin-bottom: 20px;
  }

  #stars {
    display: flex;
    gap: 4px;
  }

  /* 套餐选项 */
  .plan-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .plan-item {
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s;
    background: #fff;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  .plan-item.selected {
    border-color: #1677ff;
    background: #f0f7ff;
  }
  .plan-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #ccc;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .plan-item.selected .plan-radio {
    border-color: #1677ff;
    background: #1677ff;
  }
  .plan-radio-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    display: none;
  }
  .plan-item.selected .plan-radio-dot {
    display: block;
  }
  .plan-info {
    flex: 1;
  }
  .plan-name {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 3px;
  }
  .plan-end-time {
    font-size: 12px;
    color: #999;
  }
  .plan-price-col {
    text-align: right;
  }
  .plan-price {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 2px;
  }
  .plan-desc-text {
    font-size: 11px;
    color: #999;
  }
  .recommend-badge {
    position: absolute;
    top: 0;
    right: 0;
    background: #1677ff;
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 0 8px 0 8px;
    font-weight: 500;
  }

  /* 支付按钮 */
  .pay-btn {
    width: 100%;
    height: 50px;
    border-radius: 25px;
    background: #1677ff;
    color: #fff;
    font-size: 17px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .pay-btn:active {
    opacity: 0.85;
  }

  /* 评分区 */
  .rating-section {
    padding: 16px 16px 20px;
    border-top: 8px solid #f5f5f5;
  }
  .rating-title {
    font-size: 14px;
    color: #666;
    margin-bottom: 12px;
  }
  #stars span {
    display: inline-block;
    font-size: 32px;
    cursor: pointer;
    color: #e0e0e0;
    line-height: 1;
    padding: 4px;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: auto;
  }

  /* 模态弹窗 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.show {
    display: flex;
  }
  .modal-box {
    background: #fff;
    border-radius: 14px;
    padding: 24px 20px;
    width: 280px;
    text-align: center;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 10px;
  }
  .modal-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .modal-price {
    font-size: 28px;
    font-weight: 600;
    color: #1677ff;
    margin-bottom: 20px;
  }
  .modal-btns {
    display: flex;
    gap: 10px;
  }
  .modal-btn-cancel {
    flex: 1;
    height: 42px;
    border-radius: 21px;
    border: 1px solid #ddd;
    background: #fff;
    color: #666;
    font-size: 15px;
    cursor: pointer;
  }
  .modal-btn-confirm {
    flex: 1;
    height: 42px;
    border-radius: 21px;
    border: none;
    background: #1677ff;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }

  /* 成功弹窗 */
  .success-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #52c41a;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
  }
  .success-icon svg {
    width: 28px;
    height: 28px;
  }

  /* 管理模式样式 */
  .admin-layout {
    display: flex;
    min-height: 100vh;
  }
  .admin-panel {
    min-height: 100vh;
    overflow-y: auto;
  }
  .admin-panel:first-child {
    width: 35%;
  }
  .admin-panel:last-child {
    width: 65%;
  }
  .admin-edit-panel {
    background: #f5f7fa;
    padding: 24px;
    border-right: 1px solid #e8e8e8;
  }
  .admin-edit-panel h2 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #333;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #333;
    font-size: 14px;
  }
  .form-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
  }
  .form-input:focus {
    outline: none;
    border-color: #1677ff;
  }
  .file-upload {
    border: 2px dashed #d9d9d9;
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    background: #fff;
    cursor: pointer;
  }
  .file-upload:hover {
    border-color: #1677ff;
  }
  .file-upload input {
    display: none;
  }
  .upload-hint {
    color: #999;
    font-size: 13px;
    margin-top: 8px;
  }
  .copy-btn {
    width: 100%;
    padding: 12px;
    background: #52c41a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 12px;
    transition: opacity 0.2s;
  }
  .copy-btn:hover {
    opacity: 0.9;
  }
  .copy-btn.copied {
    background: #87d068;
  }
  .upload-status {
    margin-top: 8px;
    font-size: 13px;
    color: #666;
  }
  .upload-status.error {
    color: #ff4d4f;
  }
</style>
</head>
<body>

<!-- 原始内容将被 JavaScript 动态处理 -->
<div id="app">
</div>

<script>
  // 状态管理
  const state = {
    name: "",
    company: "",
    image: ""
  };

  // 默认值（原有内容）
  const defaultState = {
    name: "小皮咖",
    company: "广东小皮咖有限公司",
    image: "https://suporka-resource.netlify.app/img/avatar.jpg"
  }

  // 计算结束时间
  function getEndTimes() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();

    var time2h = new Date(now.getTime() + 2 * 60 * 60 * 1000);
    var time4h = new Date(now.getTime() + 4 * 60 * 60 * 1000);

    var formatTime = function(date) {
      var hh = date.getHours().toString().padStart(2, "0");
      var mm = date.getMinutes().toString().padStart(2, "0");
      return hh + ":" + mm;
    };

    return {
      time2h: formatTime(time2h),
      time4h: formatTime(time4h),
      timeDawn: "04:00"
    };
  }

  // 原始页面 HTML 模板
  function getPreviewHTML() {
    var times = getEndTimes();
    return '<div class="phone-wrap"><div class="nav-bar"><div class="nav-back" style="cursor:pointer;" onclick="window.location.href=\'https://www.suporka.site/\'"><svg width="11" height="18" viewBox="0 0 11 18" fill="none"><path d="M9.5 1.5L2 9L9.5 16.5" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></div><div class="nav-title">钉钉</div><div class="nav-more" style="cursor:pointer;" onclick="window.location.href=\'https://resource.suporka.site/\'"><div class="nav-more-dots"><span></span><span></span><span></span></div></div></div><div class="company-card"><div class="company-logo"><svg viewBox="0 0 40 40" fill="none"><path d="M20 8C20 8 12 14 8 20C12 26 20 32 20 32C20 32 28 26 32 20C28 14 20 8 20 8Z" fill="white" opacity="0.9"></path><path d="M20 8L26 18L20 16L14 18L20 8Z" fill="white"></path><path d="M14 18L8 20L14 22L20 32L14 18Z" fill="rgba(255,255,255,0.6)"></path></svg></div><div class="company-info"><div class="company-name-row"><span class="company-name">' + getValue('company') + '</span><span class="company-badge">企业认证</span></div><div class="company-sub">我的工作台<span class="company-sub-arrow">›</span></div></div></div><div class="overtime-header"><div class="overtime-title-row"><div class="overtime-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"></circle><path d="M12 7v5l3 3" stroke="white" stroke-width="2" stroke-linecap="round"></path></svg></div><span class="overtime-title">加班管理</span></div><div class="overtime-record">查看记录<span>›</span></div></div><div class="main-content"><div class="time-notice"><span class="time-notice-icon">🌙</span><div class="time-notice-text">当前时间 <span class="time-highlight" id="currentTime">19:42</span><span class="separator">|</span><span class="overtime-badge-text">已超过下班时间</span></div></div><div class="avatar-section"><div class="avatar-wrap"><img src="' + getValue('image') + '" style="width:100%;height:100%;object-fit:cover;display:block;"></div><div class="avatar-status">已到下班时间</div></div><div class="pay-title">支付加班费，让' + getValue('name') + '继续工作</div><div class="pay-desc">' + getValue('name') + '原定已下班。<br>请选择延长工时套餐，按需继续安排工作。</div><div class="plan-list" id="planList"><div class="plan-item" data-index="0"><div class="plan-radio"><div class="plan-radio-dot"></div></div><div class="plan-info"><div class="plan-name">继续工作 2 小时</div><div class="plan-end-time">预计结束时间：' + times.time2h + '</div></div><div class="plan-price-col"><div class="plan-price">¥199</div><div class="plan-desc-text">适合处理遗留事项</div></div></div><div class="plan-item" data-index="1"><div class="plan-radio"><div class="plan-radio-dot"></div></div><div class="plan-info"><div class="plan-name">继续工作 4 小时</div><div class="plan-end-time">预计结束时间：' + times.time4h + '</div></div><div class="plan-price-col"><div class="plan-price">¥499</div><div class="plan-desc-text">适合紧急汇报与临时需求</div></div></div><div class="plan-item selected" data-index="2"><div class="plan-radio"><div class="plan-radio-dot"></div></div><div class="plan-info"><div class="plan-name">工作到凌晨</div><div class="plan-end-time">预计结束时间：' + times.timeDawn + '</div></div><div class="plan-price-col"><div class="plan-price">¥1199</div><div class="plan-desc-text">帮助员工适应狼性文化</div></div><div class="recommend-badge">豪华推荐</div></div></div><button class="pay-btn" onclick="showPayModal()">立即支付并延长工时</button></div><div class="rating-section"><div class="rating-title">为本次协作打分</div><div id="stars"><span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span></div></div></div><div class="modal-overlay" id="payModal" onclick="hidePayModal(event)"><div class="modal-box"><div class="modal-title">确认支付</div><div class="modal-desc" id="modalDesc">您选择了“工作到凌晨”套餐，' + getValue('name') + '将持续工作至 ' + times.timeDawn + '。</div><div class="modal-price" id="modalPrice">¥1199</div><div class="modal-btns"><button class="modal-btn-cancel" onclick="hidePayModal()">取消</button><button class="modal-btn-confirm" onclick="confirmPay()">确认支付</button></div></div></div><div class="modal-overlay" id="successModal" onclick="hideSuccessModal(event)"><div class="modal-box"><div class="success-icon"><svg viewBox="0 0 28 28" fill="none"><path d="M5 14L11 20L23 8" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg></div><div class="modal-title">支付成功！</div><div class="modal-desc">' + getValue('name') + '已收到加班安排通知，请稍后。<br>感谢您对员工的"关爱"。</div><div class="modal-btns" style="justify-content:center;"><button class="modal-btn-confirm" style="flex:none;width:120px;" onclick="hideSuccessModal()">知道了</button></div></div></div>';
  }

  // 从 URL 读取参数
  function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      name: params.get("name") || "",
      company: params.get("company") || "",
      image: params.get("image") || ""
    };
  }

  // 判定当前模式
  function getMode() {
    const params = getParams();
    const hasValidParam = params.name || params.company || params.image;
    return hasValidParam ? "preview" : "admin";
  }

  // 获取当前生效的值（state 有值用 state，否则用默认值）
  function getValue(key) {
    return state[key] || defaultState[key];
  }

  // 渲染页面内容（用于预览模式）
  function renderContent(container = document) {
    const companyEl = container.querySelector(".company-name");
    if (companyEl) companyEl.textContent = getValue("company");

    const avatarImg = container.querySelector(".avatar-wrap img");
    if (avatarImg) {
      avatarImg.src = getValue("image");
      avatarImg.onerror = function() {
        this.style.display = "none";
        this.parentElement.style.background = "#d9d9d9";
      };
      avatarImg.onload = function() {
        this.style.display = "block";
        this.parentElement.style.background = "none";
      };
    }

    const payTitle = container.querySelector(".pay-title");
    if (payTitle) payTitle.textContent = "支付加班费，让" + getValue("name") + "继续工作";
  }

  // 更新状态并刷新预览
  function updateState(key, value) {
    state[key] = value;
    const previewPanel = document.getElementById("preview-panel");
    if (previewPanel) {
      previewPanel.innerHTML = getPreviewHTML();
      attachPreviewEvents(previewPanel);
    }
  }

  // 更新预览面板
  function updatePreview() {
    const previewPanel = document.getElementById("preview-panel");
    if (!previewPanel) return;
    previewPanel.innerHTML = getPreviewHTML();
    attachPreviewEvents(previewPanel);
  }

  // 处理图片上传
  async function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    const statusEl = document.getElementById("upload-status");
    statusEl.textContent = "上传中...";
    statusEl.className = "upload-status";

    try {
      const formData = new FormData();
      formData.append("image", file);

      const response = await fetch("https://img.scdn.io/api/v1.php", {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        throw new Error("上传失败: " + response.status);
      }

      let imageUrl = "";
      const text = await response.text();
      try {
        const json = JSON.parse(text);
        imageUrl = json.url || json;
      } catch {
        imageUrl = text;
      }

      if (!imageUrl || typeof imageUrl !== "string") {
        throw new Error("无法解析图片 URL");
      }

      updateState("image", imageUrl);

      statusEl.textContent = "上传成功";
      statusEl.className = "upload-status";
    } catch (err) {
      console.error("Upload error:", err);
      statusEl.textContent = "上传失败: " + err.message;
      statusEl.className = "upload-status error";
      alert("图片上传失败: " + err.message);
    }
  }

  // 处理复制链接
  async function handleCopyLink() {
    const params = new URLSearchParams();
    if (state.name) params.set("name", state.name);
    if (state.company) params.set("company", state.company);
    if (state.image) params.set("image", state.image);

    const baseUrl = window.location.origin + window.location.pathname;
    const url = params.toString() ? baseUrl + "?" + params.toString() : baseUrl;

    const copyBtn = document.getElementById("copy-btn");
    const originalText = copyBtn.textContent;

    try {
      await navigator.clipboard.writeText(url);
      copyBtn.textContent = "已复制";
      copyBtn.classList.add("copied");

      setTimeout(function() {
        copyBtn.textContent = originalText;
        copyBtn.classList.remove("copied");
      }, 2000);
    } catch (err) {
      window.prompt("请手动复制链接:", url);
    }
  }

  // 渲染管理模式
  function renderAdminMode() {
    document.body.innerHTML = '<div class="admin-layout"><div class="admin-panel admin-edit-panel"><h2>管理面板</h2><div class="form-group"><label class="form-label">姓名</label><input type="text" class="form-input" id="input-name" placeholder="请输入姓名" value="' + state.name + '"></div><div class="form-group"><label class="form-label">公司名称</label><input type="text" class="form-input" id="input-company" placeholder="请输入公司名称" value="' + state.company + '"></div><div class="form-group"><label class="form-label">图片上传</label><div class="file-upload" id="upload-area"><span style="color: #1677ff; font-weight: 500;">点击选择图片</span><input type="file" id="input-image" accept="image/*"><div class="upload-hint">支持 jpg、png、gif 格式</div><div class="upload-status" id="upload-status"></div></div></div><button class="copy-btn" id="copy-btn">复制链接</button></div><div class="admin-panel admin-preview-panel" id="preview-panel">' + getPreviewHTML() + '</div></div>';
    bindAdminEvents();
    attachPreviewEvents(document.getElementById("preview-panel"));
  }

  // 绑定管理模式事件
  function bindAdminEvents() {
    const inputName = document.getElementById("input-name");
    inputName.addEventListener("input", function(e) {
      state.name = e.target.value;
      updatePreview();
    });

    const inputCompany = document.getElementById("input-company");
    inputCompany.addEventListener("input", function(e) {
      state.company = e.target.value;
      updatePreview();
    });

    const uploadArea = document.getElementById("upload-area");
    const inputImage = document.getElementById("input-image");
    uploadArea.addEventListener("click", function() { inputImage.click(); });
    inputImage.addEventListener("change", handleImageUpload);

    const copyBtn = document.getElementById("copy-btn");
    copyBtn.addEventListener("click", handleCopyLink);
  }

  // 为预览面板绑定事件
  function attachPreviewEvents(container) {
    var selectedIndex = 2;
    var plans = [
      { name: "继续工作 2 小时", endTime: "21:42", price: "¥199" },
      { name: "继续工作 4 小时", endTime: "23:42", price: "¥499" },
      { name: "工作到凌晨", endTime: "01:42", price: "¥1199" }
    ];

    var planList = container.querySelector("#planList");
    if (planList) {
      planList.addEventListener("click", function(e) {
        var item = e.target.closest(".plan-item");
        if (!item) return;
        var idx = parseInt(item.getAttribute("data-index"), 10);
        selectedIndex = idx;
        container.querySelectorAll(".plan-item").forEach(function(el, i) {
          el.classList.toggle("selected", i === idx);
        });
      });
    }

    var stars = container.querySelector("#stars");
    if (stars) {
      stars.addEventListener("click", function(e) {
        var star = e.target.closest("span[data-v]");
        if (!star) return;
        var v = parseInt(star.getAttribute("data-v"), 10);
        container.querySelectorAll("#stars span").forEach(function(s, i) {
          s.style.color = i < v ? "#faad14" : "#e0e0e0";
        });
      });
    }

    // 时钟功能
    function updateTime() {
      var timeEl = container.querySelector("#currentTime");
      if (timeEl) {
        var now = new Date();
        var h = now.getHours().toString().padStart(2, "0");
        var m = now.getMinutes().toString().padStart(2, "0");
        timeEl.textContent = h + ":" + m;
      }
    }
    updateTime();
    setInterval(updateTime, 30000);
  }

  // 获取当前计划（带动态时间）
  function getPlans() {
    var times = getEndTimes();
    return [
      { name: "继续工作 2 小时", endTime: times.time2h, price: "¥199" },
      { name: "继续工作 4 小时", endTime: times.time4h, price: "¥499" },
      { name: "工作到凌晨", endTime: times.timeDawn, price: "¥1199" }
    ];
  }

  // 原有全局变量
  var selectedIndex = 2;

  function showPayModal() {
    var plans = getPlans();
    var plan = plans[selectedIndex];
    var modalDesc = document.getElementById("modalDesc");
    if (modalDesc) {
      modalDesc.textContent = "您选择了“" + plan.name + "”套餐，" + getValue("name") + "将持续工作至 " + plan.endTime + "。";
    }
    var modalPrice = document.getElementById("modalPrice");
    if (modalPrice) modalPrice.textContent = plan.price;
    var payModal = document.getElementById("payModal");
    if (payModal) payModal.classList.add("show");
  }

  function hidePayModal(e) {
    var payModal = document.getElementById("payModal");
    if (payModal && (!e || e.target === payModal)) {
      payModal.classList.remove("show");
    }
  }

  function confirmPay() {
    var payModal = document.getElementById("payModal");
    if (payModal) payModal.classList.remove("show");
    setTimeout(function() {
      var successModal = document.getElementById("successModal");
      if (successModal) successModal.classList.add("show");
    }, 200);
  }

  function hideSuccessModal(e) {
    var successModal = document.getElementById("successModal");
    if (successModal && (!e || e.target === successModal)) {
      successModal.classList.remove("show");
    }
  }

  // 实时时钟（预览模式用）
  function updateTime() {
    var timeEl = document.getElementById("currentTime");
    if (timeEl) {
      var now = new Date();
      var h = now.getHours().toString().padStart(2, "0");
      var m = now.getMinutes().toString().padStart(2, "0");
      timeEl.textContent = h + ":" + m;
    }
  }

  // 初始化页面
  function init() {
    const mode = getMode();
    const params = getParams();

    if (mode === "preview") {
      state.name = params.name;
      state.company = params.company;
      state.image = params.image;
      document.getElementById("app").innerHTML = getPreviewHTML();

      // 绑定预览模式事件
      var planList = document.getElementById("planList");
      if (planList) {
        planList.addEventListener("click", function(e) {
          var item = e.target.closest(".plan-item");
          if (!item) return;
          var idx = parseInt(item.getAttribute("data-index"), 10);
          selectedIndex = idx;
          document.querySelectorAll(".plan-item").forEach(function(el, i) {
            el.classList.toggle("selected", i === idx);
          });
        });
      }

      var stars = document.getElementById("stars");
      if (stars) {
        stars.addEventListener("click", function(e) {
          var star = e.target.closest("span[data-v]");
          if (!star) return;
          var v = parseInt(star.getAttribute("data-v"), 10);
          document.querySelectorAll("#stars span").forEach(function(s, i) {
            s.style.color = i < v ? "#faad14" : "#e0e0e0";
          });
        });
      }

      updateTime();
      setInterval(updateTime, 30000);
    } else {
      document.body.classList.add("admin-mode");
      renderAdminMode();
    }
  }

  // 启动
  init();
</script>
</body>
