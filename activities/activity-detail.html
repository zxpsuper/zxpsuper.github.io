<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/activity-detail.css">
</head>
<body>
    <div class="container">
        <div id="view-mode">
            <div id="image-swiper" class="image-swiper" style="display: none;"></div>
            <div id="no-image" class="no-image" style="display: none;">
                <span>暂无图片</span>
            </div>
            <div class="detail-content card">
                <div id="detail-title" class="detail-title"></div>
                <div id="like-section" class="like-section">
                    <span id="like-icon" class="like-icon">❤</span>
                    <span id="like-count" class="like-count">0</span>
                </div>
                <div id="detail-desc" class="detail-desc"></div>
            </div>
            <!-- <div id="reserve-section" class="reserve-section">
                <button id="reserve-btn" class="reserve-btn btn-primary">立即预约</button>
            </div> -->
        </div>
    </div>

    <div class="nav-bar">
        <span class="back-btn" onclick="history.back()">← 返回</span>
        <span class="nav-title">活动详情</span>
    </div>

    <div id="phone-modal" class="modal-mask" style="display: none;">
        <div class="modal-content">
            <div class="modal-title">填写预约信息</div>
            <div class="modal-form">
                <div class="form-row">
                    <div class="form-label">昵称</div>
                    <div class="user-info-input">
                        <img id="mini-avatar" class="mini-avatar" style="display: none;">
                        <input id="nickname-input" type="text" class="nickname-input" placeholder="请输入昵称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-label">手机号码</div>
                    <input id="phone-input" type="number" class="phone-input" placeholder="请输入手机号码" maxlength="11">
                </div>
                <div class="form-tip">昵称和手机号码至少填写一个</div>
            </div>
            <div class="modal-actions">
                <button id="cancel-btn" class="modal-btn cancel-btn">取消</button>
                <button id="confirm-btn" class="modal-btn confirm-btn">确认预约</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/activity-detail.js"></script>
</body>
</html>
